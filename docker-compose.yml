services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: po_invoices
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d po_invoices"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/po_invoices?schema=public
      PORT: 8080
      ALLOW_BOOTSTRAP_ADMIN: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    restart: unless-stopped

volumes:
  pgdata:
