version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: po_invoices
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/po_invoices?schema=public
      PORT: 8080
    depends_on:
      - db
    ports:
      - '8080:8080'

volumes:
  pgdata:
