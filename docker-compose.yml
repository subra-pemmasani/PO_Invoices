services:
 db:
 image: postgres:16
 restart: unless-stopped
 environment:
 POSTGRES_USER: ${POSTGRES_USER:-postgres}
 POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
 POSTGRES_DB: po_invoices
 volumes:
 - pgdata:/var/lib/postgresql/data
 healthcheck:
 test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d po_invoices"]
 interval: 5s
 timeout: 5s
 retries: 20

 app:
 build: .
 restart: unless-stopped
 environment:
 DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/po_invoices?schema=public
 PORT: 8080
 ALLOW_BOOTSTRAP_ADMIN: "false"
 depends_on:
 db:
 condition: service_healthy
 ports:
 - "8080:8080"

volumes:
 pgdata:
